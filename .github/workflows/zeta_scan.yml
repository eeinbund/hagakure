name: ζ-Field Scan

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub's minimum)
  workflow_dispatch:         # allow manual trigger

permissions:
  contents: write            # needed to commit zeta_data.json back

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4       # bail before the next cron fires

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install httpx numpy

      - name: Run ζ-Field scan
        run: python zeta_scanner.py --once

      - name: Commit scan results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/zeta_data.json
          git diff --cached --quiet && echo "No change" || \
            git commit -m "chore: ζ-scan $(date -u +'%H:%M UTC')" && git push
